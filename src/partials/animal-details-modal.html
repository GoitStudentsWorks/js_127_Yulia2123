<div class="modal-overlay-dtls" id="dtls-modal">
  <div class="modal-window">
    <button class="modal-close-btn" type="button" data-modal-close>
      <svg class="modal-close-icon" width="24" height="24">
        <use href="./img/sprite.svg#icon-close"></use>
      </svg>
    </button>
    <div class="modal-content">
      <div class="modal-image-wrap">
        <img
          alt="Фото тваринки"
          class="modal-image"
        />
      </div>

      <div class="modal-info">
        <div class="modal-info-part">
          <p class="modal-species"></p>
          <h2 class="modal-name bold"></h2>
          <div class="modal-meta">
            <span class="modal-age"></span>
            <span class="modal-gender"></span>
          </div>
        </div>

        <div class="modal-info-part">
          <h3 class="modal-info-h3 semi-bold">Опис:</h3>
          <p class="modal-info-text"></p>
        </div>

        <div class="modal-info-part">
          <h3 class="modal-info-h3 semi-bold">Здоров'я:</h3>
          <p class="modal-info-text"></p>
        </div>

        <div class="modal-info-part">
          <h3 class="modal-info-h3 semi-bold">Поведінка:</h3>
          <p class="modal-info-text"></p>
          </p>
        </div>
        <button type="button" class="modal-info-btn regular">
          Взяти додому
        </button>
      </div>
    </div>
  </div>
</div>
